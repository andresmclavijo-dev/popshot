<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popshot — Beautiful screenshots, pay once</title>
    <meta name="description" content="Drop a screenshot. Make it beautiful. Ship it. No account, no subscription." />
    <link rel="canonical" href="https://popshot.app" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Popshot — Beautiful screenshots in seconds" />
    <meta property="og:description" content="Drop a screenshot. Make it beautiful. Ship it. No account, no subscription." />
    <meta property="og:image" content="https://popshot.app/og-image.png" />
    <meta property="og:url" content="https://popshot.app" />
    <meta property="og:type" content="website" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Popshot — Beautiful screenshots in seconds" />
    <meta name="twitter:description" content="Drop a screenshot. Make it beautiful. Ship it. No account, no subscription." />
    <meta name="twitter:image" content="https://popshot.app/og-image.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Popshot",
      "applicationCategory": "DesignApplication",
      "operatingSystem": "Web",
      "description": "Make your screenshots pop. Auto-matched backgrounds, device frames, ambient shadows. Export at 2x. $19 once — no subscription.",
      "url": "https://popshot.app",
      "offers": {
        "@type": "Offer",
        "price": "19",
        "priceCurrency": "USD",
        "priceSpecification": {
          "@type": "UnitPriceSpecification",
          "price": "19",
          "priceCurrency": "USD",
          "name": "Lifetime license"
        }
      },
      "screenshot": "https://popshot.app/og-image.png"
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
